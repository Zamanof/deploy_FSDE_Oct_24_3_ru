name: CI/CD for time-app project

on:
  push: 
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20.19.3"]
    steps:
      - name: Cloning repository
        uses: actions/checkout@v6

      - name: Install Node.js ${{matrix.node-version}}
        uses: actions/setup-node@v6
        with:
          node-version: ${{matrix.node-version}}
      
      - name: API Dependency Install
        working-directory: ./api
        run: npm install

      - name: API unit test
        working-directory: ./api
        run: npm run test
      
      - name: Frontend Dependency Install
        working-directory: ./frontend
        run: npm install

      - name: Docker login
        run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin

      - name: API image build and push to docker hub
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/tmapi ./api
          docker push ${{secrets.DOCKER_USERNAME}}/tmapi
